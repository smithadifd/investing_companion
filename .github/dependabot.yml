version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    reviewers:
      - "smithadifd"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    reviewers:
      - "smithadifd"
    open-pull-requests-limit: 5
    ignore:
      # Next.js 16 migration planned — see docs/plans/nextjs-16-upgrade.md
      - dependency-name: "next"
        versions: [">=15.0.0"]
      - dependency-name: "eslint-config-next"
        versions: [">=15.0.0"]
      - dependency-name: "react"
        versions: [">=19.0.0"]
      - dependency-name: "react-dom"
        versions: [">=19.0.0"]
      - dependency-name: "@types/react"
        versions: [">=19.0.0"]
      - dependency-name: "@types/react-dom"
        versions: [">=19.0.0"]
      # ESLint 9 — bundled with Next.js 16 migration
      - dependency-name: "eslint"
        versions: [">=9.0.0"]
      # Tailwind v4 requires full config migration (CSS-first)
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]
      # Zustand v5 — breaking API changes, evaluate separately
      - dependency-name: "zustand"
        versions: [">=5.0.0"]

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "monthly"
    ignore:
      # Only bump to stable LTS versions manually
      - dependency-name: "python"
        versions: [">=3.13"]
      - dependency-name: "node"
        versions: [">=23"]
