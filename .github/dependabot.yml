version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    reviewers:
      - "smithadifd"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    reviewers:
      - "smithadifd"
    open-pull-requests-limit: 5
    ignore:
      # Tailwind v4 requires full config migration (CSS-first)
      - dependency-name: "tailwindcss"
        versions: [">=4.0.0"]
      # Zustand v5 — breaking API changes, evaluate separately
      - dependency-name: "zustand"
        versions: [">=5.0.0"]

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "monthly"
    ignore:
      # Only bump to stable LTS versions manually
      - dependency-name: "python"
        versions: [">=3.13"]
      - dependency-name: "node"
        versions: [">=23"]
