# Production Docker Compose for Investing Companion
# Designed for deployment on Synology NAS with Traefik reverse proxy
#
# Usage:
#   1. Copy .env.production.example to .env.production
#   2. Edit .env.production with your production values
#   3. docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Requirements:
#   - Docker and Docker Compose
#   - Domain name pointed to your server (for Let's Encrypt)
#   - Ports 80 and 443 available

version: '3.8'

services:
  # ===========================================
  # Reverse Proxy (Traefik)
  # ===========================================
  traefik:
    image: traefik:v2.11
    container_name: investing_traefik
    command:
      # Enable Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # API dashboard (disabled in production)
      - "--api.dashboard=false"
      # Logging
      - "--log.level=WARN"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
    networks:
      - investing_network
    restart: unless-stopped

  # ===========================================
  # Database
  # ===========================================
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: investing_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investing_network
    restart: unless-stopped
    # No port exposure - only accessible within Docker network

  # ===========================================
  # Redis (Cache + Celery Broker)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: investing_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investing_network
    restart: unless-stopped
    # No port exposure - only accessible within Docker network

  # ===========================================
  # Database Migration (init container)
  # ===========================================
  migrate:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend.prod
    container_name: investing_migrate
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ENVIRONMENT=production
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - investing_network
    # One-shot container - runs migrations and exits

  # ===========================================
  # Backend API
  # ===========================================
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend.prod
    container_name: investing_api
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
      - CORS_ORIGINS=https://${DOMAIN}
      # External API Keys (optional)
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - POLYGON_API_KEY=${POLYGON_API_KEY:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      # Auth settings
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`, `/health`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # Rate limiting
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=50"
      - "traefik.http.routers.api.middlewares=api-ratelimit"
    networks:
      - investing_network
    restart: unless-stopped
    # Resource limits for Synology
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ===========================================
  # Celery Worker (Background Tasks)
  # ===========================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend.prod
    container_name: investing_celery_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=warning", "--concurrency=2"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - investing_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ===========================================
  # Celery Beat (Scheduler)
  # ===========================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend.prod
    container_name: investing_celery_beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=warning"]
    depends_on:
      - celery_worker
    networks:
      - investing_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================================
  # Frontend
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend.prod
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api/v1
    container_name: investing_frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api/v1
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - investing_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  postgres_data:
    name: investing_postgres_data
  redis_data:
    name: investing_redis_data
  traefik_letsencrypt:
    name: investing_traefik_letsencrypt
  traefik_logs:
    name: investing_traefik_logs

networks:
  investing_network:
    name: investing_network
