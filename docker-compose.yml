version: '3.8'

services:
  # ===========================================
  # Database
  # ===========================================
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: investing_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-investing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-investing_dev}
      POSTGRES_DB: ${POSTGRES_DB:-investing_companion}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-investing}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # Redis (Cache + Celery Broker)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: investing_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # Backend API
  # ===========================================
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: investing_api
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-investing}:${POSTGRES_PASSWORD:-investing_dev}@db:5432/${POSTGRES_DB:-investing_companion}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # External API Keys (optional)
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - POLYGON_API_KEY=${POLYGON_API_KEY:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ===========================================
  # Celery Worker (Background Tasks)
  # ===========================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: investing_celery_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-investing}:${POSTGRES_PASSWORD:-investing_dev}@db:5432/${POSTGRES_DB:-investing_companion}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info
    restart: unless-stopped

  # ===========================================
  # Celery Beat (Scheduler)
  # ===========================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: investing_celery_beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-investing}:${POSTGRES_PASSWORD:-investing_dev}@db:5432/${POSTGRES_DB:-investing_companion}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./backend:/app
    depends_on:
      - celery_worker
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped

  # ===========================================
  # Frontend
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: investing_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: npm run dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: investing_network
